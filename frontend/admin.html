<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | BIRGUNJ FASHION COLLECTION</title>
  <style>
    :root {
      --ink: #202124;
      --muted: #667085;
      --line: #e7e8ec;
      --bg: #f7f5ef;
      --panel: #ffffff;
      --brand: #b42318;
      --green: #087443;
      --shadow: 0 18px 50px rgba(32, 33, 36, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    button, input, textarea, select { font: inherit; }
    button {
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      background: var(--ink);
      color: white;
      min-height: 42px;
      padding: 0 16px;
      font-weight: 750;
    }
    button.secondary { background: #ffffff; color: var(--ink); border: 1px solid var(--line); }
    button.danger { background: var(--brand); }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: #fff;
      color: var(--ink);
    }
    textarea { min-height: 92px; resize: vertical; }
    img { max-width: 100%; display: block; }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247, 245, 239, 0.94);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(32, 33, 36, 0.08);
    }
    .nav {
      max-width: 1180px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: 0;
    }
    .mark {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      color: white;
      background: var(--brand);
      font-weight: 950;
    }
    .nav a {
      color: var(--ink);
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 6px;
      font-weight: 750;
      font-size: 14px;
      background: #fff;
      border: 1px solid var(--line);
    }
    main { padding: 46px 18px; }
    .wrap { max-width: 1180px; margin: 0 auto; }
    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }
    h1 { font-size: clamp(30px, 4vw, 48px); margin: 0; letter-spacing: 0; }
    h2 { font-size: clamp(26px, 4vw, 38px); margin: 0; letter-spacing: 0; }
    .muted { color: var(--muted); }
    .panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(32, 33, 36, .05);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid .full { grid-column: 1 / -1; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
    .admin-row, .order-row {
      display: grid;
      grid-template-columns: 58px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }
    .order-row {
      grid-template-columns: minmax(180px, 240px) minmax(0, 1fr) minmax(260px, 360px);
      align-items: start;
      gap: 18px;
    }
    .order-id {
      overflow-wrap: anywhere;
      line-height: 1.35;
    }
    .order-details {
      min-width: 0;
      line-height: 1.35;
    }
    .order-details span { display: block; overflow-wrap: anywhere; }
    .order-actions {
      display: grid;
      gap: 8px;
      min-width: 0;
    }
    .admin-row img { width: 58px; height: 72px; object-fit: cover; border-radius: 6px; }
    .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .tabs button { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    .tabs button.active { background: var(--ink); color: #fff; }
    .hidden { display: none !important; }
    .notice {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: var(--ink);
      color: #fff;
      padding: 12px 16px;
      border-radius: 6px;
      z-index: 40;
      box-shadow: var(--shadow);
    }
    @media (max-width: 900px) {
      .nav { align-items: flex-start; flex-direction: column; }
      .two-col { grid-template-columns: 1fr; }
      .order-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      main { padding: 34px 14px; }
      .form-grid { grid-template-columns: 1fr; }
      .admin-row { grid-template-columns: 50px 1fr; }
      .admin-row > :last-child { grid-column: 1 / -1; }
      .button-row { grid-template-columns: 1fr; }
    }
    .admin-image-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
    .admin-image-row > div { border: 1px solid var(--line); padding: 8px; border-radius: 6px; }
    .img-preview { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; margin-top: 5px; background: #f0f0f0; display: block; }
    .admin-live-preview { width: 150px; aspect-ratio: 4/5; border: 2px dashed var(--line); border-radius: 8px; overflow: hidden; margin: 0 auto 15px; position: relative; }
    .slider-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
    .product-slider { display: flex; transition: transform 0.4s ease-in-out; height: 100%; width: 100%; }
    .product-slider img { flex: 0 0 100%; width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <div class="brand"><span class="mark">BF</span><span>BIRGUNJ FASHION COLLECTION</span></div>
      <a href="index.html">Back to Store</a>
    </nav>
  </header>

  <main>
    <div class="wrap">
      <div class="section-head">
        <div>
          <h1>Admin Panel</h1>
          <p class="muted">Manage products, orders, QR payment, pages, payments, and returns.</p>
        </div>
        <button id="logoutButton" class="secondary hidden" onclick="adminLogout()">Logout</button>
      </div>

      <div id="adminLogin" class="panel">
        <div class="form-grid">
          <input id="adminPhone" placeholder="Admin phone" autocomplete="off" />
          <input id="adminPassword" type="password" placeholder="Password" autocomplete="new-password" />
          <button class="full" onclick="adminLogin()">Login</button>
        </div>
      </div>

      <div id="adminPanel" class="hidden">
        <div class="tabs">
          <button class="active" onclick="adminTab('products', this)">Products</button>
          <button onclick="adminTab('orders', this)">Orders</button>
          <button onclick="adminTab('payments', this)">Payments</button>
          <button onclick="adminTab('returns', this)">Returns</button>
          <button onclick="adminTab('chats', this)">Chats</button>
          <button onclick="adminTab('pages', this)">Pages & QR</button>
        </div>
        <div id="adminContent"></div>
      </div>
    </div>
  </main>

  <script>
    const API = "";
    let products = [];
    let settings = {};
    let pages = {};
    let adminToken = localStorage.getItem("bfc_admin_token") || "";

    const money = (n) => `Rs. ${Number(n || 0).toLocaleString("en-IN")}`;
    const dateText = (date) => new Date(date).toLocaleDateString("en-IN", { month: "short", day: "numeric", year: "numeric" });
    const adminHeaders = () => ({ "Content-Type": "application/json", Authorization: `Bearer ${adminToken}` });

    function toast(message) {
      const el = document.createElement("div");
      el.className = "notice";
      el.textContent = message;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2600);
    }

    async function api(path, options = {}) {
      const res = await fetch(API + path, options);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    async function init() {
      const [productData, settingsData] = await Promise.all([
        api("/api/products?t=" + Date.now()), 
        api("/api/settings?t=" + Date.now())
      ]);
      products = productData;
      settings = settingsData.settings;
      pages = settingsData.pages;
      if (adminToken) showAdmin();
    }

    async function adminLogin() {
      try {
        const data = await api("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            phone: document.getElementById("adminPhone").value,
            password: document.getElementById("adminPassword").value
          })
        });
        adminToken = data.token;
        localStorage.setItem("bfc_admin_token", adminToken);
        showAdmin();
      } catch (e) { toast(e.message); }
    }

    function adminLogout() {
      adminToken = "";
      localStorage.removeItem("bfc_admin_token");
      document.getElementById("adminLogin").classList.remove("hidden");
      document.getElementById("adminPanel").classList.add("hidden");
      document.getElementById("logoutButton").classList.add("hidden");
      document.getElementById("adminContent").innerHTML = "";
    }

    function showAdmin() {
      document.getElementById("adminLogin").classList.add("hidden");
      document.getElementById("adminPanel").classList.remove("hidden");
      document.getElementById("logoutButton").classList.remove("hidden");
      renderAdminProducts();
    }

    function adminTab(name, btn) {
      document.querySelectorAll(".tabs button").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      if (name === "products") renderAdminProducts();
      if (name === "orders") renderAdminOrders();
      if (name === "payments") renderAdminPayments();
      if (name === "returns") renderAdminReturns();
      if (name === "chats") renderAdminChats();
      if (name === "pages") renderAdminPages();
    }

    // Central image store — one entry per slot [0]=primary,[1]=extra1,[2]=extra2,[3]=extra3
    const _imgData = { 0: "", 1: "", 2: "", 3: "" };

    function renderAdminProducts() {
      document.getElementById("adminContent").innerHTML = `
        <div class="two-col">
          <form class="panel" onsubmit="saveProduct(event)">
            <h3 id="productFormTitle">Add Product</h3>
            <div class="admin-live-preview" id="adminSliderPrev">
              <div class="slider-container">
                <div class="product-slider" id="productSliderAdmin" data-index="0" data-count="1">
                  <img id="adminPrevImg" src="" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
              </div>
            </div>
            <div class="form-grid">
              <input type="hidden" id="editProductId">
              <input id="pName" placeholder="Product name" required>
              <input id="pCategory" placeholder="Category" required>
              <input id="pPrice" type="number" placeholder="Price" required>
              <input id="pStock" type="number" placeholder="Stock" value="10">
              <textarea class="full" id="pDescription" placeholder="Description"></textarea>
              
              <div class="full" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                <strong>Product Images</strong>
                <button type="button" class="danger" style="padding:4px 12px;" onclick="clearAllExtras()">Clear All Extra Slots</button>
              </div>
              <div class="full admin-image-row">
                <div>
                  <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label>Primary Image</label>
                    <button type="button" class="danger" style="padding:2px 8px; font-size:10px;" onclick="clearSlot(0,'pImage','pUpload')">Clear</button>
                  </div>
                  <input id="pImage" placeholder="URL">
                  <input id="pUpload" type="file" accept="image/*" onchange="previewImg(this, 0)">
                  <img id="prev1" class="img-preview">
                </div>
                <div>
                  <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label>Extra 1</label>
                    <button type="button" class="danger" style="padding:2px 8px; font-size:10px;" onclick="clearSlot(1,'pImage2','pUpload2')">Clear</button>
                  </div>
                  <input id="pImage2" placeholder="URL">
                  <input id="pUpload2" type="file" accept="image/*" onchange="previewImg(this, 1)">
                  <img id="prev2" class="img-preview">
                </div>
                <div>
                  <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label>Extra 2</label>
                    <button type="button" class="danger" style="padding:2px 8px; font-size:10px;" onclick="clearSlot(2,'pImage3','pUpload3')">Clear</button>
                  </div>
                  <input id="pImage3" placeholder="URL">
                  <input id="pUpload3" type="file" accept="image/*" onchange="previewImg(this, 2)">
                  <img id="prev3" class="img-preview">
                </div>
                <div>
                  <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label>Extra 3</label>
                    <button type="button" class="danger" style="padding:2px 8px; font-size:10px;" onclick="clearSlot(3,'pImage4','pUpload4')">Clear</button>
                  </div>
                  <input id="pImage4" placeholder="URL">
                  <input id="pUpload4" type="file" accept="image/*" onchange="previewImg(this, 3)">
                  <img id="prev4" class="img-preview">
                </div>
              </div>

              <input class="full" id="pSizes" placeholder="Available Sizes (comma-separated, e.g., S, M, L)" value="S, M, L, XL">
              <label class="full"><input id="pFeatured" type="checkbox" style="width:auto"> Featured</label>
              <button class="full">Save Product</button>
              <button type="button" class="full secondary" onclick="resetProductForm()">Clear Form</button>
            </div>
          </form>
          <div class="panel">
            <h3>Products</h3>
            ${products.map((p) => `<div class="admin-row"><img src="${p.image}" alt="${p.name}"><div><strong>${p.name}</strong><br><span class="muted">${money(p.price)} | ${p.category} | Stock ${p.stock}</span></div><div class="button-row"><button class="secondary" onclick="editProduct('${p.id}')">Edit</button><button class="danger" onclick="deleteProduct('${p.id}')">Delete</button></div></div>`).join("")}
          </div>
        </div>`;
    }

    function editProduct(id) {
      const p = products.find((product) => product.id === id);
      if (!p) return;
      document.getElementById("productFormTitle").textContent = "Edit Product";
      document.getElementById("editProductId").value = p.id;
      document.getElementById("pName").value = p.name;
      document.getElementById("pCategory").value = p.category;
      document.getElementById("pPrice").value = p.price;
      document.getElementById("pStock").value = p.stock;
      document.getElementById("pDescription").value = p.description;
      document.getElementById("pSizes").value = (p.sizes || []).join(", ");
      document.getElementById("pFeatured").checked = Boolean(p.featured);

      // Store image data in JS variables — single source of truth
      _imgData[0] = p.image || "";
      _imgData[1] = p.extraImages?.[0] || "";
      _imgData[2] = p.extraImages?.[1] || "";
      _imgData[3] = p.extraImages?.[2] || "";

      // Clear all file inputs so no stale file reference lingers
      document.getElementById("pUpload").value = "";
      document.getElementById("pUpload2").value = "";
      document.getElementById("pUpload3").value = "";
      document.getElementById("pUpload4").value = "";

      // Populate URL fields only for http URLs
      document.getElementById("pImage").value = _imgData[0].startsWith("http") ? _imgData[0] : "";
      document.getElementById("pImage2").value = _imgData[1].startsWith("http") ? _imgData[1] : "";
      document.getElementById("pImage3").value = _imgData[2].startsWith("http") ? _imgData[2] : "";
      document.getElementById("pImage4").value = _imgData[3].startsWith("http") ? _imgData[3] : "";

      // Update individual slot preview images
      document.getElementById("prev1").src = _imgData[0] || "";
      document.getElementById("prev2").src = _imgData[1] || "";
      document.getElementById("prev3").src = _imgData[2] || "";
      document.getElementById("prev4").src = _imgData[3] || "";

      refreshAdminSlider();
      document.getElementById("productFormTitle").scrollIntoView({ behavior: "smooth" });
    }

    function previewImg(input, slotIndex) {
      // slotIndex: 0=primary,1=extra1,2=extra2,3=extra3
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        const idx = parseInt(slotIndex, 10);
        reader.onload = (e) => {
          _imgData[idx] = e.target.result;
          // Also update the individual slot preview image
          const prevIds = ["prev1", "prev2", "prev3", "prev4"];
          const prevEl = document.getElementById(prevIds[idx]);
          if (prevEl) prevEl.src = e.target.result;
          refreshAdminSlider();
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function refreshAdminSlider() {
      const imgs = [_imgData[0], _imgData[1], _imgData[2], _imgData[3]].filter(Boolean);
      const container = document.getElementById("productSliderAdmin");
      if (!container) return;
      container.setAttribute("data-count", imgs.length || 1);
      container.innerHTML = (imgs.length ? imgs : [""]).map(src => `<img src="${src}" style="width:100%;height:100%;object-fit:cover;">`).join("");
      setSliderAdmin(0);
    }

    function setSliderAdmin(idx) {
      const slider = document.getElementById("productSliderAdmin");
      if (!slider) return;
      slider.setAttribute("data-index", idx);
      slider.style.transform = `translateX(-${idx * 100}%)`;
    }

    function resetProductForm() {
      document.getElementById("productFormTitle").textContent = "Add Product";
      document.getElementById("editProductId").value = "";
      // Clear JS image store
      _imgData[0] = ""; _imgData[1] = ""; _imgData[2] = ""; _imgData[3] = "";
      document.getElementById("pUpload").value = "";
      document.getElementById("pUpload2").value = "";
      document.getElementById("pUpload3").value = "";
      document.getElementById("pUpload4").value = "";
      document.getElementById("pImage").value = "";
      document.getElementById("pImage2").value = "";
      document.getElementById("pImage3").value = "";
      document.getElementById("pImage4").value = "";
      // Clear individual previews
      ["prev1", "prev2", "prev3", "prev4"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.removeAttribute("src");
      });
      document.getElementById("pSizes").value = "S, M, L, XL";
      document.querySelector("#adminContent form").reset();
      document.getElementById("pSizes").value = "S, M, L, XL";
      refreshAdminSlider();
    }

    function clearSlot(slotIndex, urlId, fileId) {
      const idx = parseInt(slotIndex, 10);
      _imgData[idx] = "";
      if (urlId) document.getElementById(urlId).value = "";
      if (fileId) document.getElementById(fileId).value = "";
      // Clear the individual slot preview image
      const prevIds = ["prev1", "prev2", "prev3", "prev4"];
      const prevEl = document.getElementById(prevIds[idx]);
      if (prevEl) prevEl.removeAttribute("src");
      refreshAdminSlider();
    }

    function clearAllExtras() {
      clearSlot(1, 'pImage2', 'pUpload2');
      clearSlot(2, 'pImage3', 'pUpload3');
      clearSlot(3, 'pImage4', 'pUpload4');
      toast("All extra image slots cleared!");
    }

    async function saveProduct(event) {
      event.preventDefault();
      const btn = event.target.querySelector("button");
      const originalText = btn.textContent;
      try {
        btn.disabled = true;
        btn.textContent = "Saving... Please wait";

        // Helper: read file input as base64, or return empty string
        const readFile = (fileInputId) => new Promise((resolve) => {
          const input = document.getElementById(fileInputId);
          if (!input || !input.files || !input.files[0]) return resolve("");
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => resolve("");
          reader.readAsDataURL(input.files[0]);
        });

        // For each slot: new file upload wins, then URL input, then previously loaded data
        const getSlot = async (fileInputId, urlInputId, slotIndex) => {
          const fromFile = await readFile(fileInputId);
          if (fromFile) return fromFile;
          const urlEl = document.getElementById(urlInputId);
          if (urlEl && urlEl.value.trim()) return urlEl.value.trim();
          return _imgData[slotIndex] || "";
        };

        const i1 = await getSlot("pUpload",  "pImage",  0);
        const i2 = await getSlot("pUpload2", "pImage2", 1);
        const i3 = await getSlot("pUpload3", "pImage3", 2);
        const i4 = await getSlot("pUpload4", "pImage4", 3);

        const extraImages = [i2, i3, i4].filter(Boolean);

        const id = document.getElementById("editProductId").value;
        const payload = {
          name: document.getElementById("pName").value,
          category: document.getElementById("pCategory").value,
          price: document.getElementById("pPrice").value,
          stock: document.getElementById("pStock").value,
          description: document.getElementById("pDescription").value,
          image: i1,
          extraImages: extraImages,
          sizes: document.getElementById("pSizes").value.split(",").map(s => s.trim()).filter(Boolean),
          featured: document.getElementById("pFeatured").checked
        };

        await api(id ? `/api/admin/products/${id}` : "/api/admin/products", {
          method: id ? "PUT" : "POST",
          headers: adminHeaders(),
          body: JSON.stringify(payload)
        });

        await new Promise(r => setTimeout(r, 400));
        products = await api("/api/products?t=" + Date.now());
        renderAdminProducts();
        resetProductForm();
        toast(`${id ? "Updated" : "Added"}! Images saved: ${extraImages.length + 1}`);
      } catch (e) {
        toast(e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    async function deleteProduct(id) {
      try {
        await api(`/api/admin/products/${id}`, { method: "DELETE", headers: adminHeaders() });
        products = await api("/api/products");
        renderAdminProducts();
        toast("Product deleted");
      } catch (e) { toast(e.message); }
    }

    async function renderAdminOrders() {
      try {
        const orders = await api("/api/admin/orders", { headers: adminHeaders() });
        document.getElementById("adminContent").innerHTML = `<div class="panel"><h3>Orders</h3>${orders.map((o) => `
          <div class="order-row">
            <div class="order-id"><strong>${o.id}</strong></div>
            <div class="order-details">
              <strong>${money(o.total)} | ${o.paymentMethod}</strong><br>
              <span class="muted">Phone: ${o.customer.phone}${o.customer.additionalPhone ? `, ${o.customer.additionalPhone}` : ""}</span>
              <span class="muted">Email: ${o.customer.email || "Not provided"}</span>
              <span class="muted">Address: ${o.customer.address}</span>
              <span class="muted">GPS: ${o.customer.location ? `<a href="${o.customer.location.mapUrl}" target="_blank" rel="noopener">Open customer location</a>` : "Not provided"}</span>
              <span class="muted">Items: ${o.items.map((item) => `${item.name} x ${item.quantity}`).join(", ")}</span>
              <span class="muted">Payment ref: ${o.paymentReference || "Not provided"}</span>
            </div>
            <div class="order-actions">
              <select onchange="updateOrder('${o.id}', this.value, null)"><option>${o.paymentStatus}</option><option>Verified</option><option>Pending manual verification</option><option>Pay on delivery</option></select>
              <select onchange="updateOrder('${o.id}', null, this.value)"><option>${o.orderStatus}</option><option>Packed</option><option>Shipped</option><option>Delivered</option><option>Cancelled</option></select>
            </div>
          </div>`).join("") || "<p>No orders yet.</p>"}</div>`;
      } catch (e) { toast(e.message); }
    }

    async function updateOrder(id, paymentStatus, orderStatus) {
      try {
        await api(`/api/admin/orders/${id}`, {
          method: "PUT",
          headers: adminHeaders(),
          body: JSON.stringify({ paymentStatus, orderStatus, trackingLabel: orderStatus })
        });
        toast("Order updated");
      } catch (e) { toast(e.message); }
    }

    async function renderAdminPayments() {
      try {
        const payments = await api("/api/admin/payments", { headers: adminHeaders() });
        document.getElementById("adminContent").innerHTML = `<div class="panel"><h3>Payment History</h3>${payments.map((p) => `<p><strong>${p.orderId}</strong> ${money(p.amount)} | ${p.method} | ${p.status}</p>`).join("") || "<p>No payments yet.</p>"}</div>`;
      } catch (e) { toast(e.message); }
    }

    async function renderAdminReturns() {
      try {
        const returns = await api("/api/admin/returns", { headers: adminHeaders() });
        document.getElementById("adminContent").innerHTML = `<div class="panel"><h3>Return/Refund Requests</h3>${returns.map((r) => `<div class="order-row"><strong>${r.orderId}</strong><span>${r.reason} | ${r.status}</span><select onchange="updateReturn('${r.id}', this.value)"><option>${r.status}</option><option>Approved</option><option>Rejected</option><option>Refunded</option></select></div>`).join("") || "<p>No requests.</p>"}</div>`;
      } catch (e) { toast(e.message); }
    }

    async function updateReturn(id, status) {
      try {
        await api(`/api/admin/returns/${id}`, { method: "PUT", headers: adminHeaders(), body: JSON.stringify({ status }) });
        toast("Return updated");
      } catch (e) { toast(e.message); }
    }

    async function renderAdminChats() {
      try {
        const chats = await api("/api/admin/chats", { headers: adminHeaders() });
        document.getElementById("adminContent").innerHTML = `<div class="panel"><h3>Live Chat Queries</h3>${chats.map((chat) => `
          <div class="order-row">
            <strong>${chat.name}</strong>
            <span>${chat.message}<br><span class="muted">${chat.phone || "No phone"} | ${chat.status} | ${dateText(chat.createdAt)}</span></span>
            <select onchange="updateChat('${chat.id}', this.value)"><option>${chat.status}</option><option>New</option><option>Contacted</option><option>Resolved</option></select>
          </div>`).join("") || "<p>No chat queries.</p>"}</div>`;
      } catch (e) { toast(e.message); }
    }

    async function updateChat(id, status) {
      try {
        await api(`/api/admin/chats/${id}`, { method: "PUT", headers: adminHeaders(), body: JSON.stringify({ status }) });
        toast("Chat updated");
      } catch (e) { toast(e.message); }
    }

    function renderAdminPages() {
      document.getElementById("adminContent").innerHTML = `
        <form class="panel" onsubmit="savePages(event)">
          <div class="form-grid">
            <input class="full" id="setAboutTitle" placeholder="About title" value="${pages.aboutTitle || "About Us"}">
            <textarea class="full" id="setAbout" placeholder="About text">${pages.about || ""}</textarea>
            <input class="full" id="setContactTitle" placeholder="Contact title" value="${pages.contactTitle || "Contact"}">
            <textarea class="full" id="setContactText" placeholder="Contact text">${pages.contactText || "Reach us for sizing, payment, delivery, and return/refund queries."}</textarea>
            <textarea class="full" id="setServices" placeholder="Services">${pages.services}</textarea>
            <input class="full" id="setQr" placeholder="QR code image URL" value="${settings.qrCode}">
            <input class="full" id="setQrUpload" type="file" accept="image/*">
            <input id="setPhone" placeholder="Store phone" value="${settings.storePhone}">
            <input id="setEmail" placeholder="Store email" value="${settings.storeEmail}">
            <button class="full">Save Settings</button>
          </div>
        </form>`;
    }

    async function savePages(event) {
      event.preventDefault();
      try {
        const uploadedQr = await readUpload(document.getElementById("setQrUpload"));
        const data = await api("/api/admin/settings", {
          method: "PUT",
          headers: adminHeaders(),
          body: JSON.stringify({
            pages: {
              aboutTitle: document.getElementById("setAboutTitle").value,
              about: document.getElementById("setAbout").value,
              services: document.getElementById("setServices").value,
              contactTitle: document.getElementById("setContactTitle").value,
              contactText: document.getElementById("setContactText").value
            },
            settings: {
              qrCode: uploadedQr || document.getElementById("setQr").value,
              storePhone: document.getElementById("setPhone").value,
              storeEmail: document.getElementById("setEmail").value
            }
          })
        });
        pages = data.pages;
        settings = data.settings;
        toast("Settings saved");
      } catch (e) { toast(e.message); }
    }

    init().catch((e) => toast(e.message));
  </script>
</body>
</html>
